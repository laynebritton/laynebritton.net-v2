name: Deploy Pipeline

concurrency:
  group: deploy-main
  cancel-in-progress: true
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    name: Deploy to DEV

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to DEV Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: >
            pages deploy build
            --project-name ${{ secrets.DEV_ENVIRONMENT_PROJECT }}
            --branch main
            --commit-dirty=true

  test-dev:
    needs: deploy-dev
    name: Test DEV

    uses: ./.github/workflows/playwright.yml

    with:
      base_url: https://dev.laynebritton.net
      environment: dev
  deploy-prod:
    needs: test-dev
    runs-on: ubuntu-latest
    name: Deploy to PROD

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          REACT_APP_ENVIRONMENT: ${{ secrets.REACT_APP_ENVIRONMENT }}
          REACT_APP_MIXPANEL_ANALYTICS_TOKEN: ${{ secrets.REACT_APP_MIXPANEL_ANALYTICS_TOKEN }}

      - name: Deploy to PROD Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: >
            pages deploy build
            --project-name ${{ secrets.PROD_ENVIRONMENT_PROJECT }}
            --branch main
            --commit-dirty=true

  test-prod:
    needs: deploy-prod
    name: Test PROD

    uses: ./.github/workflows/playwright.yml

    with:
      base_url: https://www.laynebritton.net
      environment: prod