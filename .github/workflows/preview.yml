name: Preview Deployment

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
    branches:
      - main

jobs:
  preview:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy Preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: >
            pages deploy build
            --project-name ${{ secrets.DEV_ENVIRONMENT_PROJECT }}
            --branch preview-pr-${{ github.event.number }}
            --commit-dirty=true

      - name: Extract Preview URL
        id: extract
        run: |
          echo "Extracting preview URL..."

          OUTPUT="${{ steps.deploy.outputs.command-output }}"

          URL=$(echo "$OUTPUT" \
            | grep -o 'https://preview-[^ ]*\.pages\.dev' \
            | head -n 1)

          echo "Preview URL: $URL"

          echo "preview_url=$URL" >> $GITHUB_OUTPUT

      - name: Create or Update Preview Comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.extract.outputs.preview_url }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const previewUrl = process.env.PREVIEW_URL;

            const marker = "<!-- preview-url-comment -->";

            const body = `${marker}
            🚀 **Preview Deployment Ready**

            🔗 ${previewUrl}

            _(Updates automatically on new commits)_`;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber
            });

            const existingComment = comments.data.find(comment =>
              comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
            }
